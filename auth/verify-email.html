<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="gm-depth" content="../"><title>Verify Email — Good Market</title><link rel="stylesheet" href="../assets/css/design-system.css">
